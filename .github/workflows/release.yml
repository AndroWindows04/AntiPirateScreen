# AntiPirateScreen Release Workflow
# Creates releases with all build artifacts
# Branch: tibi624
# Author: TIBI624

name: Release AntiPirateScreen

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: |
            **/*.dll
            **/*.so
            **/*.dylib
            **/*.lib
            **/*.a
            **/*.pyd
            **/*.jar
            **/*.nupkg
            .aps/*.aps
            .aps/*.xtml

      - name: Notify Release
        run: |
          echo "AntiPirateScreen Release Created!"
          echo "Tag: ${{ github.ref_name }}"
          echo "Author: TIBI624"